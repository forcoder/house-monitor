name: Android Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix gradlew line endings
      run: sed -i 's/\r$//' gradlew

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK as Artifact
      uses: actions/upload-artifact@v5
      with:
        name: house-monitor-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix gradlew line endings
      run: sed -i 's/\r$//' gradlew

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Get version
      id: version
      run: |
        VERSION=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
        name: 房源监控 v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
        body: |
          ## 房源监控 APP 更新
          - 支持多平台房源监控（美团民宿优先）
          - 状态变化实时通知
          - 完整历史记录查看
        files: app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
