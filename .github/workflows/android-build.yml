name: Android Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  # Job 1: 构建 Debug APK（PR/push 时）
  # ─────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: windows-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build Debug APK
      run: .\gradlew.bat assembleDebug --no-daemon

    - name: Upload Debug APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: house-monitor-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

  # ─────────────────────────────────────────
  # Job 2: 构建 Release APK + 上传 + 发布（打 tag 时）
  # ─────────────────────────────────────────
  build-release-and-publish:
    name: Build Release & Publish
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build Release APK
      run: .\gradlew.bat assembleRelease --no-daemon

    - name: Get version
      id: version
      run: |
        $versionName = Select-String -Path "app\build.gradle" -Pattern 'versionName\s+"([^"]+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value }
        $versionCode = Select-String -Path "app\build.gradle" -Pattern 'versionCode\s+(\d+)' | ForEach-Object { $_.Matches[0].Groups[1].Value }
        Write-Output "version_name=$versionName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Output "version_code=$versionCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Output "VERSION=$versionName CODE=$versionCode"

    - name: Calculate MD5 and prepare version-info.json
      id: apk
      run: |
        $apkFile = Get-ChildItem -Path "app\build\outputs\apk\release" -Filter "*.apk" | Select-Object -First 1
        if ($null -eq $apkFile) {
          Write-Output "Error: No APK file found!"
          exit 1
        }
        Write-Output "Found APK: $($apkFile.FullName)"
        $md5 = (Get-FileHash -Path $apkFile.FullName -Algorithm MD5).Hash.ToLower()
        $size = $apkFile.Length
        Write-Output "MD5: $md5"
        Write-Output "Size: $size bytes"
        Write-Output "md5=$md5" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Output "size=$size" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Output "path=$($apkFile.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

        $versionName = "${{ steps.version.outputs.version_name }}"
        $date = Get-Date -Format "yyyy-MM-dd"
        $versionInfo = @{
          versionCode = ${{ steps.version.outputs.version_code }}
          versionName = $versionName
          releaseDate = $date
          fileSize = $size
          md5 = $md5
          downloadUrl = "https://shz.al/~houseMonitorApk2"
          releaseNotes = "v$versionName 更新"
          forceUpdate = $false
        } | ConvertTo-Json
        $versionInfo | Out-File -FilePath "version-info.json" -Encoding utf8
        Write-Output "version-info.json content:"
        Get-Content "version-info.json"

    - name: Upload version-info.json to shz.al
      env:
        SHZAL_PASSWORD: ${{ secrets.SHZAL_PASSWORD }}
      run: |
        $ErrorActionPreference = "Stop"
        Write-Output "Uploading version-info.json to shz.al..."

        # Delete old version file
        try {
          $deleteResp = Invoke-WebRequest -Uri "https://shz.al/~houseMonitorLog2`:$env:SHZAL_PASSWORD" -Method DELETE -UseBasicParsing
          Write-Output "Delete response: $($deleteResp.Content)"
        } catch {
          Write-Output "Delete (may not exist): $($_.Exception.Message)"
        }

        Start-Sleep -Seconds 2

        # Upload new version-info.json
        $resp = Invoke-WebRequest -Uri "https://shz.al" -Method POST -Form @{
          n = "houseMonitorLog2"
          e = "7d"
          c = Get-Item "version-info.json"
          s = $env:SHZAL_PASSWORD
        } -UseBasicParsing
        Write-Output "Version info upload response: $($resp.Content)"

    - name: Upload APK to shz.al
      env:
        SHZAL_PASSWORD: ${{ secrets.SHZAL_PASSWORD }}
      run: |
        $ErrorActionPreference = "Stop"
        Write-Output "Uploading APK to shz.al..."

        # Delete old APK
        try {
          $deleteResp = Invoke-WebRequest -Uri "https://shz.al/~houseMonitorApk2`:$env:SHZAL_PASSWORD" -Method DELETE -UseBasicParsing
          Write-Output "Delete response: $($deleteResp.Content)"
        } catch {
          Write-Output "Delete (may not exist): $($_.Exception.Message)"
        }

        Start-Sleep -Seconds 2

        # Upload new APK
        $resp = Invoke-WebRequest -Uri "https://shz.al" -Method POST -Form @{
          n = "houseMonitorApk2"
          e = "7d"
          filename = "house-monitor-${{ steps.version.outputs.version_name }}.apk"
          c = Get-Item "${{ steps.apk.outputs.path }}"
          s = $env:SHZAL_PASSWORD
        } -UseBasicParsing
        Write-Output "APK upload response: $($resp.Content)"

    - name: Output deployment summary
      run: |
        Write-Output "## 🚀 部署完成" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "| 字段 | 值 |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "|------|-----|" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "| 版本 | v${{ steps.version.outputs.version_name }} |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "| MD5 | ${{ steps.apk.outputs.md5 }} |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "| 版本信息 | https://shz.al/~houseMonitorLog2 |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        Write-Output "| APK 下载 | https://shz.al/~houseMonitorApk2 |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

    - name: Upload Release APK for GitHub Release
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 90

  # ─────────────────────────────────────────
  # Job 3: 创建 GitHub Release
  # ─────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    runs-on: windows-latest
    timeout-minutes: 5
    needs: build-release-and-publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: release-apk
        path: ./apk-output

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "房源监控 v${{ needs.build-release-and-publish.outputs.version_name }}"
        body: |
          ## 📦 房源监控 v${{ needs.build-release-and-publish.outputs.version_name }}

          ### 下载
          - 📥 **APK 下载（shz.al）：** https://shz.al/~houseMonitorApk2
          - 📋 **版本信息：** https://shz.al/~houseMonitorLog2

          ### 更新内容
          - 支持多平台房源监控（美团民宿优先）
          - 状态变化实时通知
          - OTA 在线升级功能
          - 完整历史记录查看
        files: ./apk-output/*.apk
        draft: false
        prerelease: false
