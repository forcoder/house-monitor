name: Android CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'  # 最新版本

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        GRADLE_OPTS: -Xmx4g

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: house-monitor-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports/
          app/build/outputs/logs/
        if-no-files-found: ignore

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: house-monitor-debug

    - name: Get version info
      id: version
      run: |
        VERSION_NAME=$(grep 'APP_VERSION_NAME' gradle.properties | cut -d'=' -f2)
        VERSION_CODE=$(grep 'APP_VERSION_CODE' gradle.properties | cut -d'=' -f2)
        echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: app-debug.apk
        tag_name: v${{ steps.version.outputs.version_name }}
        name: 房源监控 v${{ steps.version.outputs.version_name }}
        body: |
          ## 美团房源监控APP

          ### 版本信息
          - 版本号: v${{ steps.version.outputs.version_name }}
          - 版本码: ${{ steps.version.outputs.version_code }}
          - 构建时间: ${{ github.run_started_at }}

          ### 功能特点
          ✅ 自动监控美团小程序房源可用性
          ✅ 每5分钟检查一次房源状态
          ✅ 发现无房日期时发送系统通知
          ✅ 后台服务持续运行
          ✅ 设备重启后自动恢复监控

          ### 安装说明
          1. 下载APK文件
          2. 允许安装未知来源应用
          3. 安装并打开应用
          4. 输入美团小程序地址
          5. 点击"开始监控"

          ### 注意事项
          - 请允许应用发送通知
          - 美团小程序地址需要是有效的房源页面URL
          - 建议在电量充足的情况下使用
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}